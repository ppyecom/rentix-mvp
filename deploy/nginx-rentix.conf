# Nginx como reverse proxy: expone Rentix en el puerto 80 y reenvía a Node (127.0.0.1:4000).
#
# Instalar:
#   sudo cp deploy/nginx-rentix.conf /etc/nginx/sites-available/rentix
#   sudo ln -s /etc/nginx/sites-available/rentix /etc/nginx/sites-enabled/rentix
#   sudo rm -f /etc/nginx/sites-enabled/default   # opcional: quita el sitio por defecto
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;

    # Reemplaza por tu dominio, o deja _ para responder por IP
    server_name _;

    # Límite de subida (imágenes en base64, etc.)
    client_max_body_size 5M;

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
